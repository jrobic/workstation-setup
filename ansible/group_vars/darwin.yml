---
# macOS variables.
brewfile_global: "{{ playbook_dir }}/../brew/Brewfile"
brewfile_host: "{{ playbook_dir }}/../brew/Brewfile.{{ ansible_facts.hostname | default('') }}"

# Runtimes installed globally by mise (default versions; per-project
# managed via .mise.toml / .nvmrc in each repo).
mise_global_tools:
  - { name: "node", version: "lts" }
  - { name: "go", version: "latest" }
  - { name: "python", version: "latest" }
  - { name: "bun", version: "latest" }

# Mac App Store apps — installed via community.general.mas (idempotent: checks
# `mas list`, skips if present). Kept OUT of the Brewfile because brew bundle's mas
# fails non-interactively. Requires being signed into the App Store on a fresh machine.
mas_apps:
  - { name: "Spark Desktop", id: 6445813049 }

# Dock (dockutil) — persistent apps.
dock_persistent_apps:
  - "/Applications/Spark Desktop.app"
  - "/Applications/Obsidian.app"
  - "/Applications/Firefox Developer Edition.app"
  - "/Applications/Visual Studio Code.app"
  - "/Applications/DataGrip.app"
