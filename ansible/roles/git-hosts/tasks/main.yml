---
# git-hosts role — per-machine SSH key + upload to GitHub and GitLab.
# Single ed25519 key, pushed to both hosts (auth + signing).

- name: Check for existing SSH key
  ansible.builtin.stat:
    path: "{{ ssh_key_path }}"
  register: ssh_key_stat

- name: Generate per-machine SSH key (only if absent)
  ansible.builtin.command: >
    ssh-keygen -t ed25519 -f {{ ssh_key_path }} -N "" -C "{{ ssh_key_title }}"
  when: not ssh_key_stat.stat.exists
  # Only generates when missing — never reads/touches an existing (possibly
  # passphrase-protected) key. Avoids openssh_keypair's "unable to read key" failure.

# ── GitHub (gh) — OAuth device flow, no PAT ──
- name: Check GitHub authentication
  ansible.builtin.command: gh auth status
  changed_when: false
  failed_when: false
  register: gh_auth

- name: Prompt for GitHub login if needed (interactive)
  ansible.builtin.pause:
    prompt: |
      GitHub not authenticated. In another terminal, run:
          gh auth login
      (choose SSH, device flow). Press Enter once done.
  when: gh_auth.rc != 0

- name: List GitHub SSH keys (idempotence)
  ansible.builtin.command: gh ssh-key list
  changed_when: false
  register: gh_keys

- name: Upload pubkey to GitHub
  ansible.builtin.command: >
    gh ssh-key add {{ ssh_key_path }}.pub --title "{{ ssh_key_title }}" --type authentication
  when: ssh_key_title not in (gh_keys.stdout | default(''))

# ── GitLab (glab) — PAT required (api + write_repository), from Dashlane ──
- name: Check GitLab authentication
  ansible.builtin.command: glab auth status
  changed_when: false
  failed_when: false
  register: glab_auth

- name: Authenticate glab via Dashlane PAT
  ansible.builtin.shell: >
    set -o pipefail;
    dcli password "{{ dashlane_gitlab_pat_item }}" |
    glab auth login --stdin --use-keyring
  args:
    executable: /bin/bash
  when: glab_auth.rc != 0
  # NB: confirm exact syntax `dcli password <item>` (raw password output).

- name: List GitLab SSH keys (idempotence)
  ansible.builtin.command: glab ssh-key list
  changed_when: false
  failed_when: false
  register: glab_keys

- name: Upload pubkey to GitLab
  ansible.builtin.command: >
    glab ssh-key add {{ ssh_key_path }}.pub --title "{{ ssh_key_title }}" --usage-type auth_and_signing
  when: ssh_key_title not in (glab_keys.stdout | default(''))
