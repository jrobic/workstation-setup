---
# git-hosts role — per-machine SSH key + upload to GitHub and GitLab.
# Single ed25519 key, pushed to both hosts (auth + signing).

- name: Check for existing SSH key
  ansible.builtin.stat:
    path: "{{ ssh_key_path }}"
  register: ssh_key_stat

- name: Generate per-machine SSH key (only if absent)
  ansible.builtin.command: >
    ssh-keygen -t ed25519 -f {{ ssh_key_path }} -N "" -C "{{ ssh_key_title }}"
  when: not ssh_key_stat.stat.exists
  # Only generates when missing — never reads/touches an existing (possibly
  # passphrase-protected) key. Avoids openssh_keypair's "unable to read key" failure.

- name: Read local public key material (base64 blob, for fingerprint-based idempotence)
  ansible.builtin.shell: "awk '{print $2}' {{ ssh_key_path }}.pub"
  register: ssh_pub_material
  changed_when: false

# ── GitHub (gh) — OAuth device flow, no PAT ──
- name: Check GitHub authentication
  ansible.builtin.command: gh auth status
  changed_when: false
  failed_when: false
  register: gh_auth

- name: Prompt for GitHub login if needed (interactive)
  ansible.builtin.pause:
    prompt: |
      GitHub not authenticated. In another terminal, run:
          gh auth login
      (choose SSH, device flow). Press Enter once done.
  when: gh_auth.rc != 0

- name: List registered GitHub SSH keys (full material via API)
  ansible.builtin.command: gh api --paginate /user/keys
  changed_when: false
  register: gh_keys
  retries: 3
  delay: 3
  until: gh_keys.rc == 0      # tolerate transient GitHub 5xx

- name: Upload pubkey to GitHub (only if this key is not already registered)
  ansible.builtin.command: >
    gh ssh-key add {{ ssh_key_path }}.pub --title "{{ ssh_key_title }}" --type authentication
  when: ssh_pub_material.stdout not in (gh_keys.stdout | default(''))

# ── GitLab (glab) — PAT required (api + write_repository), from Dashlane ──
- name: Check GitLab authentication
  ansible.builtin.command: glab auth status
  changed_when: false
  failed_when: false
  register: glab_auth

- name: Authenticate glab via Dashlane PAT
  ansible.builtin.shell: >
    set -o pipefail;
    dcli password "{{ dashlane_gitlab_pat_item }}" |
    glab auth login --stdin --use-keyring
  args:
    executable: /bin/bash
  when: glab_auth.rc != 0
  # NB: confirm exact syntax `dcli password <item>` (raw password output).

- name: List registered GitLab SSH keys (full material via API)
  ansible.builtin.command: glab api /user/keys
  changed_when: false
  register: glab_keys
  retries: 3
  delay: 3
  until: glab_keys.rc == 0    # tolerate transient API 5xx; required (no blind upload)

- name: Upload pubkey to GitLab (only if this key is not already registered)
  ansible.builtin.command: >
    glab ssh-key add {{ ssh_key_path }}.pub --title "{{ ssh_key_title }}" --usage-type auth_and_signing
  when: ssh_pub_material.stdout not in (glab_keys.stdout | default(''))
