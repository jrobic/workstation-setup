---
# chezmoi role — public dotfiles. Source = this repo (home/ subfolder via .chezmoiroot).
# Secrets are injected at apply time via Dashlane templates (dcli).

- name: Install chezmoi
  community.general.homebrew:
    name: chezmoi
    state: present

- name: Initialize chezmoi from this repo (if not already done)
  ansible.builtin.command: "chezmoi init --source {{ playbook_dir }}/.."
  args:
    creates: "{{ ansible_facts.user_dir }}/.config/chezmoi/chezmoi.toml"

- name: Apply dotfiles
  ansible.builtin.command: chezmoi apply --source "{{ playbook_dir }}/.."
  register: chezmoi_apply
  changed_when: chezmoi_apply.stdout | length > 0
