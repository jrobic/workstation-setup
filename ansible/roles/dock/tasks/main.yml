---
# dock role — persistent Dock apps via dockutil.

- name: Install dockutil
  community.general.homebrew:
    name: dockutil
    state: present

- name: Get current Dock persistent app labels (ordered)
  ansible.builtin.shell: "dockutil --list | cut -f1"
  register: dock_current
  changed_when: false

- name: Compute desired Dock labels (basename without .app)
  ansible.builtin.set_fact:
    dock_desired_labels: "{{ dock_persistent_apps | map('basename') | map('regex_replace', '\\.app$', '') | list }}"

# Deterministic: if the current ordered apps differ from desired, clear all and
# re-add every app in order. Avoids the stale-list bug (per-item guard read the
# list captured BEFORE the remove → removed apps were skipped on re-add).
- name: Reset Dock to the desired apps (only when it differs)
  when: dock_current.stdout_lines != dock_desired_labels
  block:
    - name: Clear all persistent apps
      ansible.builtin.command: dockutil --remove all --no-restart
      changed_when: true

    - name: Add desired apps in order
      ansible.builtin.command: "dockutil --add '{{ item }}' --no-restart"
      loop: "{{ dock_persistent_apps }}"
      changed_when: true

    - name: Restart Dock
      ansible.builtin.command: killall Dock
      changed_when: true
      failed_when: false
