---
# gpg role — PER-MACHINE GPG signing key + git config + GitHub/GitLab upload.
#
# - The PRIVATE key stays in ~/.gnupg (never versioned).
# - The fingerprint (signingkey) is NOT a secret (public identifier) but it's
#   PER-MACHINE → written to ~/.gitconfig.local (not versioned), included by
#   the versioned ~/.gitconfig via `[include] path = ~/.gitconfig.local`.
# - See docs/signing.md (passphrase tradeoff, manual fallback).

- name: Check if GPG key already exists for the email
  ansible.builtin.command: "gpg --list-secret-keys --with-colons {{ git_email }}"
  register: gpg_existing
  changed_when: false
  failed_when: false

- name: Generate GPG signing key (ed25519, no passphrase) if absent
  ansible.builtin.command: >
    gpg --batch --pinentry-mode loopback --passphrase ''
    --quick-generate-key "{{ git_name }} <{{ git_email }}>" ed25519 sign never
  when: "'sec:' not in (gpg_existing.stdout | default(''))"
  # No passphrase = frictionless signing. Passphrase-via-Dashlane variant: docs/signing.md.

- name: Retrieve signing key fingerprint
  ansible.builtin.shell: >
    set -o pipefail;
    gpg --list-secret-keys --with-colons "{{ git_email }}" |
    awk -F: '/^fpr:/ {print $10; exit}'
  args:
    executable: /bin/bash
  register: gpg_fpr
  changed_when: false

- name: Write ~/.gitconfig.local (per-machine signing, not versioned)
  ansible.builtin.copy:
    dest: "{{ ansible_facts.user_dir }}/.gitconfig.local"
    mode: "0644"
    content: |
      # Generated by ansible gpg role — per-machine, NOT versioned.
      [user]
      	signingkey = {{ gpg_fpr.stdout }}
      [commit]
      	gpgsign = true
      [tag]
      	gpgsign = true

- name: Export GPG public key (armored) to temporary file
  ansible.builtin.shell: "gpg --armor --export {{ gpg_fpr.stdout }} > {{ ansible_facts.user_dir }}/.gnupg/pub_signing.asc"
  args:
    creates: "{{ ansible_facts.user_dir }}/.gnupg/pub_signing.asc"

# ── GitHub: gh gpg-key add ──
- name: List GitHub GPG keys (idempotence)
  ansible.builtin.command: gh gpg-key list
  changed_when: false
  failed_when: false
  register: gh_gpg

- name: Upload GPG key to GitHub
  ansible.builtin.command: "gh gpg-key add {{ ansible_facts.user_dir }}/.gnupg/pub_signing.asc"
  when: (gpg_fpr.stdout | default('XXXX'))[8:16] not in (gh_gpg.stdout | default(''))

# ── GitLab: no gpg-key subcommand → REST API ──
- name: List GitLab GPG keys (idempotence)
  ansible.builtin.command: glab api /user/gpg_keys
  changed_when: false
  failed_when: false
  register: gl_gpg

- name: Upload GPG key to GitLab via API
  ansible.builtin.shell: >
    set -o pipefail;
    glab api --method POST /user/gpg_keys
    --field key="$(cat {{ ansible_facts.user_dir }}/.gnupg/pub_signing.asc)"
  args:
    executable: /bin/bash
  when: (gpg_fpr.stdout | default('')) not in (gl_gpg.stdout | default(''))
  # To validate on first run: multi-line encoding of --field key (else --raw-field / @file).
