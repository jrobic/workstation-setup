# mise — default global runtimes.
# Per-project managed in each repo via .mise.toml / .nvmrc (switch on cd).
# Rust is intentionally ABSENT: managed by rustup (rust-toolchain.toml per project).
[tools]
node = "lts"
go = "latest"
python = "latest"
bun = "latest"

[settings]
# Respect existing idiomatic files (.nvmrc, .node-version) without migration.
idiomatic_version_file_enable_tools = ["node"]
